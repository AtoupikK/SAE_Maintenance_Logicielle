name: Generer de la JavaDoc avec une IA Ollama

on:
  push:
    branches: [main]
    paths:
      - "borne_arcade/*.java"
  workflow_dispatch:

jobs:
  generate-doc:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Install Java
      uses: actions/setup-java@v4
      with: 
        distribution: temurin
        java-version: 21

    - name: Install Ollama
      run: |
        curl -fsSL https://ollama.com/install.sh | sh

    - name: Start Ollama
      run: |
        ollama serve &
        sleep 5

    - name: Pull model
      run: ollama pull deepseek-coder:6.7b

    - name: Compile project
      cd git/borne_arcade
      run: javac -cp "libs/javaparser-core-3.25.10.jar:." GenerateDoc.java

    - name: Run doc generator
      cd git/borne_arcade
      run: java -cp "libs/javaparser-cpre-3.25.10.jar:." GenerateDoc

    - name: Commit changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "Génération automatique de documentation" || echo "Rien à modifier"
        git push
