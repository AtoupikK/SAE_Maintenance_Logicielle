name: Generer de la JavaDoc avec une IA Ollama

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths:
      - "git/borne_arcade/*.java"
  workflow_dispatch:

jobs:
  generate-doc:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        persist-credentials: true

    - name: Install Java
      uses: actions/setup-java@v4
      with: 
        distribution: temurin
        java-version: 21

    - name: Install Ollama
      run: curl -fsSL https://ollama.com/install.sh | sh

    - name: Start Ollama
      run: |
        ollama serve &
        sleep 5

    - name: Pull model
      run: ollama pull deepseek-coder:6.7b

    - name: Get modified Java files
      id: modified-files
      run: |
        # Récupère les fichiers modifiés dans le push
        FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
          | grep "^git/borne_arcade/[^/]*\.java$" || true)
        echo "Fichiers modifiés : $FILES"
        FILES_COMMA=$(echo "$FILES" | paste -sd "," -)
        echo "files=$FILES_COMMA" >> $GITHUB_OUTPUT

    - name: Run doc generator
      if: steps.modified-files.outputs.files != ''
      working-directory: git/borne_arcade
      run: |
        javac -cp "libs/javaparser-core-3.25.10.jar:." GenerateDoc.java
        IFS=',' read -ra FILE_ARRAY <<< "${{ steps.modified-files.outputs.files }}"
        for f in "${FILE_ARRAY[@]}"; do
          echo "Processing $f"
          java -cp "libs/javaparser-core-3.25.10.jar:." GenerateDoc "$f"
        done

    - name: Commit changes
      if: steps.set-files.outputs.files != ''
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "Génération automatique de documentation" || echo "Rien à modifier"
        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/AtoupikK/SAE_Maintenance_Logicielle.g>
